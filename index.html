<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberType Express</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
</head>

<body>
    <div id="startWindow">
        <div class="modalbox">
            <h1 class="glitch">CYBERTYPE</h1>
            <p>Initialize terminal sequence. Type to begin.</p>
            <button id="startButton">INITIALIZE</button>
        </div>
    </div>

    <div id="mainContent">
        <h1 class="main-title">CyberType</h1>
        <div id="statsRow">
            <div class="stat-item">
                <span class="stat-label">Duration</span>
                <div class="time-options">
                    <button class="time-btn" data-time="15">15</button>
                    <button class="time-btn" data-time="30">30</button>
                    <button class="time-btn active" data-time="60">60</button>
                    <div class="custom-time-wrapper">
                        <input type="number" id="customTimeInput" placeholder="Custom" min="1">
                        <button id="setCustomTime">Set</button>
                    </div>
                </div>
            </div>
             <div class="stat-item">
                <span class="stat-label">Time</span>
                <span id="timer" class="stat-value">60</span>
            </div>
            
            <div class="stat-item">
                <span class="stat-label">WPM</span>
                <span id="wpm" class="stat-value">0</span>
            </div>

            <div class="stat-item">
                <span class="stat-label">Accuracy</span>
                <span id="accuracy" class="stat-value">0</span><span class="stat-value-unit">%</span>
            </div>

            <div class="stat-item">
                <button id="midTestRestart" class="icon-button" title="Restart Test">⟳</button>
            </div>
        </div>
        <div id="typingArea">
            <div id="textDisplay"></div>
            <textarea id="hiddenInput" spellcheck="false" autocomplete="off"></textarea>
        </div>
    </div>

    <div id="newTestWindow" style="display:none;">
        <div class="modalBox">
            <div id="finalScore"></div>
            <button id="newTestButton">REBOOT TEST</button>
        </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
